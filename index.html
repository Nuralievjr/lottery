<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розыгрыш</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: rgba(0,0,0,0); }
body {
  background: #0a0a12;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, sans-serif;
  user-select: none;
  -webkit-user-select: none;
}
.wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 30px 20px;
  width: 100%;
  max-width: 460px;
}
.stage {
  width: 100%;
  height: 200px;
  background: #06060e;
  border: 1px solid rgba(201,162,39,0.35);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
#pcvs {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 2;
}
#nd {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 130px;
  font-weight: 400;
  color: rgba(235,215,175,0.88);
  line-height: 1;
  z-index: 1;
}
#nd.win {
  color: #D4AF37;
  animation: pop 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes pop {
  0%   { transform: scale(0.5); opacity: 0; }
  60%  { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
#wm {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 16px 40px;
  background: #06060e;
  border: 1px solid rgba(201,162,39,0.35);
  border-radius: 14px;
  width: 100%;
  animation: up 0.4s ease;
}
@keyframes up {
  from { transform: translateY(8px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
#wm .lbl {
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(201,162,39,0.5);
}
#wm .num {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 60px;
  font-weight: 400;
  color: #D4AF37;
  line-height: 1.1;
}
#btn {
  width: 100%;
  padding: 20px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 5px;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid rgba(201,162,39,0.45);
  border-radius: 12px;
  color: rgba(201,162,39,0.9);
  text-align: center;
  cursor: pointer;
  display: block;
}
#btn.off {
  opacity: 0.25;
  pointer-events: none;
}
#btn:active { opacity: 0.6; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage" id="stage">
    <canvas id="pcvs"></canvas>
    <div id="nd">—</div>
  </div>
  <div id="wm">
    <div class="lbl">победитель</div>
    <div class="num" id="wn">—</div>
  </div>
  <div id="btn">Крутить</div>
</div>

<script>
var T=14, P=13, N=T*P;
var schedule=[], cur=0, spinning=false;

function shuffle(a){
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}

(function init(){
  var e=[];
  for(var i=0;i<T;i++){
    var s=i*P+1, en=(i+1)*P;
    e.push({winner:s+Math.floor(Math.random()*P), s:s, e:en});
  }
  schedule=shuffle(e);
  sizeCvs();
})();

function sizeCvs(){
  var st=document.getElementById('stage');
  var c=document.getElementById('pcvs');
  c.width=st.offsetWidth;
  c.height=st.offsetHeight;
}

var btn=document.getElementById('btn');
btn.addEventListener('touchstart', function(e){
  e.preventDefault();
  spin();
}, {passive:false});
btn.addEventListener('click', function(e){
  spin();
});

function spin(){
  if(spinning||cur>=T) return;
  spinning=true;
  btn.className='off';
  document.getElementById('wm').style.display='none';
  var nd=document.getElementById('nd');
  nd.className='';
  nd.textContent='—';

  var item=schedule[cur];
  var target=item.winner;
  var dur=4500+Math.random()*1500;
  var t0=performance.now();
  var lastTick=-1;

  function ease(t){ return 1-Math.pow(1-t,4); }

  function frame(now){
    var el=now-t0;
    var t=Math.min(el/dur,1);
    var iv=16+ease(t)*384;
    var tick=Math.floor(el/iv);
    if(tick!==lastTick){
      lastTick=tick;
      var s;
      if(t<0.82){
        s=1+Math.floor(Math.random()*N);
      } else {
        var p=(t-0.82)/0.18;
        if(p<0.5){
          s=item.s+Math.floor(Math.random()*P);
        } else {
          var off=Math.max(0,Math.floor((1-p)*5));
          s=Math.max(item.s,Math.min(item.e,target+Math.floor((Math.random()-0.5)*(off*2+1))));
        }
      }
      nd.textContent=s;
    }
    if(t<1){
      requestAnimationFrame(frame);
    } else {
      nd.textContent=target;
      nd.className='win';
      setTimeout(function(){ burst(); finish(); }, 250);
    }
  }
  requestAnimationFrame(frame);
}

function finish(){
  document.getElementById('wn').textContent=schedule[cur].winner;
  document.getElementById('wm').style.display='flex';
  spinning=false;
  cur++;
  if(cur>=T){
    btn.textContent='завершено';
    btn.className='off';
  } else {
    btn.className='';
  }
}

function burst(){
  var c=document.getElementById('pcvs');
  var ctx=c.getContext('2d');
  var W=c.width, H=c.height;
  var cols=['#D4AF37','#FFE066','#fff','#F0C040'];
  var ps=[];
  for(var i=0;i<70;i++){
    var a=Math.random()*Math.PI*2;
    var sp=2+Math.random()*7;
    ps.push({x:W/2,y:H/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
             r:1.5+Math.random()*3,c:cols[Math.floor(Math.random()*cols.length)],life:1});
  }
  function anim(){
    ctx.clearRect(0,0,W,H);
    var alive=false;
    for(var i=0;i<ps.length;i++){
      var p=ps[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.13; p.life-=0.018;
      if(p.life>0){
        alive=true;
        ctx.globalAlpha=p.life;
        ctx.fillStyle=p.c;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      }
    }
    if(alive) requestAnimationFrame(anim);
    else ctx.clearRect(0,0,W,H);
  }
  requestAnimationFrame(anim);
}

window.onresize=sizeCvs;
</script>
</body>
</html>
